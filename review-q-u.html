<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مراجعة Q-U — المعهد الأكاديمي الحديث</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{--ink:#1C2B39;--ink-2:#111C26;--chalk:#F5F1E6;--gold:#C99A3E;--gold-soft:#E7C67B;--terminal:#5FBF8A;--pencil:#B24A36;--serif:'IBM Plex Serif',serif;--sans:'IBM Plex Sans',sans-serif;--mono:'IBM Plex Mono',monospace;--arabic:'Noto Sans Arabic',sans-serif;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:var(--sans);background:linear-gradient(180deg,#F7F3E9 0%,#F5F1E6 100%);color:var(--ink);}
  .wrap{max-width:560px;margin:0 auto;padding:24px 16px 70px;}
  .ar{direction:rtl;text-align:right;font-family:var(--arabic);}
  .top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .badge{font-family:var(--mono);font-weight:700;font-size:.8rem;color:var(--chalk);background:var(--ink);border-radius:8px;padding:6px 12px;}
  .btn-outline{border-color:#d5c9a3;color:var(--ink);background:transparent;padding:6px 12px;font-size:.78rem;border-radius:10px;border:1.5px solid #d5c9a3;text-decoration:none;font-family:var(--sans);}
  h1{font-family:var(--serif);font-size:1.4rem;margin:0 0 6px;}
  p{color:#4a5a68;}
  .cw-grid{display:grid;direction:ltr;gap:2px;margin:16px auto;background:var(--ink);padding:2px;border-radius:8px;width:fit-content;}
  .cw-cell{width:36px;height:36px;background:#fff;display:flex;align-items:center;justify-content:center;position:relative;}
  .cw-cell.block{background:transparent;}
  .cw-cell input{
    width:100%;height:100%;border:none;text-align:center;font-family:var(--mono);font-weight:700;
    font-size:1.05rem;text-transform:uppercase;background:transparent;color:var(--pencil);
  }
  .cw-cell input:focus{outline:2px solid var(--gold);}
  .cw-num{position:absolute;top:1px;left:2px;font-size:.55rem;color:#8a7d5c;font-family:var(--mono);}
  .clues{margin-top:18px;}
  .clue-group h3{font-family:var(--serif);font-size:1rem;margin:14px 0 6px;}
  .clue{font-size:.88rem;color:#4a5a68;margin-bottom:4px;direction:ltr;text-align:left;}
  .check-btn{margin-top:16px;}
  .btn{display:inline-block;padding:11px 20px;border-radius:10px;font-weight:600;font-size:.9rem;cursor:pointer;border:1px solid transparent;font-family:var(--sans);}
  .btn-gold{background:linear-gradient(135deg,var(--gold),#d9ac54);color:var(--ink-2);}
  #result{margin-top:12px;font-weight:700;text-align:center;}
</style>
</head>
<body>
<div class="wrap">
  <div class="top-bar"><div class="badge">REVIEW · Q-U</div><div style="display:flex;gap:8px;"><a href="letter-engine.html?id=v" class="btn-outline" style="background:var(--gold);color:var(--ink-2);border-color:var(--gold);">المتابعة لحرف V ←</a><a href="index.html" class="btn-outline">🏠</a></div></div>
  <h1 class="ar">كلمات متقاطعة — راجع حروف Q إلى U</h1>
  <p class="ar">استخدم الرموز التعبيرية كدليل لملء الكلمات في الشبكة.</p>
  <div class="cw-grid" id="cwGrid" style="grid-template-columns:repeat(5,36px);grid-template-rows:repeat(5,36px);"></div>
  <div class="clues">
    <div class="clue-group"><h3>➡️ أفقي</h3><div id="acrossClues"></div></div>
    <div class="clue-group"><h3>⬇️ عمودي</h3><div id="downClues"></div></div>
  </div>
  <div style="text-align:center;" class="check-btn"><button class="btn btn-gold" onclick="checkAnswers()">تحقق ✓</button></div>
  <div id="result"></div>
</div>
<script>
// Verified conflict-free placement (checked programmatically before shipping):
// QUEEN across (0,0), QUICK down (0,0) sharing Q, UP across (1,0) sharing U, CUTE across (3,0) sharing C
var SIZE = 5;
var BLOCK = null;
var grid = Array.from({length:SIZE}, ()=>Array(SIZE).fill(BLOCK));
var solution = Array.from({length:SIZE}, ()=>Array(SIZE).fill(''));
var entries = [];

function placeWord(word, row, col, dir, clueEmoji, num){
  for(var i=0;i<word.length;i++){
    var r = dir==='A' ? row : row+i;
    var c = dir==='A' ? col+i : col;
    solution[r][c] = word[i];
    if(grid[r][c]===BLOCK) grid[r][c] = {num: null};
  }
  if(grid[row][col].num === null) grid[row][col].num = num;
  entries.push({word:word, row:row, col:col, dir:dir, emoji:clueEmoji, num:num});
}

placeWord("QUEEN", 0, 0, 'A', "👑", 1);
placeWord("QUICK", 0, 0, 'D', "⚡", 1);
placeWord("UP",    1, 0, 'A', "⬆️", 2);
placeWord("CUTE",  3, 0, 'A', "😊", 3);

var gridEl = document.getElementById('cwGrid');
var cellRefs = {};
for(var r=0;r<SIZE;r++){
  for(var c=0;c<SIZE;c++){
    var div = document.createElement('div');
    if(grid[r][c]===BLOCK){
      div.className = 'cw-cell block';
    } else {
      div.className = 'cw-cell';
      if(grid[r][c].num) div.innerHTML = '<span class="cw-num">'+grid[r][c].num+'</span>';
      var input = document.createElement('input');
      input.maxLength = 1;
      input.id = 'cell-'+r+'-'+c;
      input.oninput = function(){ this.value = this.value.toUpperCase(); };
      div.appendChild(input);
      cellRefs[r+'-'+c] = input;
    }
    gridEl.appendChild(div);
  }
}

var across = entries.filter(function(e){ return e.dir==='A'; }).sort(function(a,b){return a.num-b.num;});
var down = entries.filter(function(e){ return e.dir==='D'; }).sort(function(a,b){return a.num-b.num;});
document.getElementById('acrossClues').innerHTML = across.map(function(e){ return '<div class="clue">'+e.num+'. '+e.emoji+' ('+e.word.length+' letters)</div>'; }).join('');
document.getElementById('downClues').innerHTML = down.map(function(e){ return '<div class="clue">'+e.num+'. '+e.emoji+' ('+e.word.length+' letters)</div>'; }).join('');

function checkAnswers(){
  var allCorrect = true;
  for(var r=0;r<SIZE;r++){
    for(var c=0;c<SIZE;c++){
      if(grid[r][c] !== BLOCK){
        var input = cellRefs[r+'-'+c];
        var correct = input.value.toUpperCase() === solution[r][c];
        input.style.color = input.value ? (correct ? '#3f8f63' : '#B24A36') : '';
        if(!correct) allCorrect = false;
      }
    }
  }
  var result = document.getElementById('result');
  if(allCorrect){
    result.style.color = '#3f8f63';
    result.textContent = '🎉 ممتاز! كل الإجابات صحيحة!';
  } else {
    result.style.color = '#B24A36';
    result.textContent = 'بعض الإجابات غير صحيحة، حاول مرة أخرى.';
  }
}
</script>
</body>
</html>
