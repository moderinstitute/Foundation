<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">حرف — المعهد الأكاديمي الحديث</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans:wght@400;600;700&family=Noto+Sans+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1C2B39; --ink-2:#111C26;
    --chalk:#F5F1E6; --chalk-dim:#E4DBC6;
    --gold:#C99A3E; --gold-soft:#E7C67B;
    --terminal:#5FBF8A; --pencil:#B24A36;
    --serif:'IBM Plex Serif',serif; --sans:'IBM Plex Sans',sans-serif; --mono:'IBM Plex Mono',monospace;
    --arabic:'Noto Sans Arabic',sans-serif; --ipa:'IBM Plex Mono','Noto Sans',monospace;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:var(--sans);background:linear-gradient(180deg,#F7F3E9 0%,#F5F1E6 100%);color:var(--ink);}
  .wrap{max-width:720px;margin:0 auto;padding:20px 20px 70px;}
  p{color:#4a5a68;line-height:1.6;margin:0 0 6px;}
  .ar{direction:rtl;text-align:right;font-family:var(--arabic);}
  .top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .letter-chip{font-family:var(--mono);font-weight:700;font-size:.85rem;color:var(--chalk);background:var(--ink);border-radius:8px;padding:6px 12px;}
  .progress-track{height:4px;background:#e9e0c9;border-radius:6px;overflow:hidden;margin:0 0 10px;}
  .step-nav-row{display:flex;gap:6px;margin-bottom:16px;direction:ltr;}
  .step-nav-btn{
    flex:1;text-align:center;font-family:var(--mono);font-size:.68rem;padding:6px 4px;border-radius:8px;
    border:1px solid #e6dcc2;background:#FDFBF5;color:#8a7d5c;cursor:pointer;
  }
  .step-nav-btn.active{background:var(--ink);color:var(--chalk);border-color:var(--ink);font-weight:700;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-soft));width:0%;transition:width .35s ease;border-radius:6px;}
  .screen{display:none;animation:fade .3s ease;} .screen.active{display:block;}
  .sub-screen{display:none;animation:fade .3s ease;} .sub-screen.active{display:block;}
  @keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
  .card{border:1px solid #e6dcc2;border-radius:14px;padding:16px 18px;background:#FDFBF5;margin-bottom:12px;box-shadow:0 4px 18px -6px rgba(60,50,20,.06);}
  .btn{display:inline-block;padding:11px 20px;border-radius:10px;font-weight:600;font-size:.9rem;cursor:pointer;border:1px solid transparent;font-family:var(--sans);transition:transform .12s ease;}
  .btn-gold{background:linear-gradient(135deg,var(--gold),#d9ac54);color:var(--ink-2);box-shadow:0 5px 14px -4px rgba(201,154,62,.5);}
  .btn-gold:hover{transform:translateY(-1px);} .btn-gold:disabled{opacity:.4;cursor:not-allowed;box-shadow:none;}
  .btn-outline{border-color:#d5c9a3;color:var(--ink);background:transparent;}
  .nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:6px;direction:ltr;}
  .play-btn{font-family:var(--mono);font-size:.72rem;border:1px solid var(--terminal);color:var(--terminal);background:#f2fbf6;border-radius:20px;padding:5px 12px;cursor:pointer;}
  .big-sound{text-align:center;margin:0 0 10px;}
  .big-sound .ipa{font-family:var(--ipa);font-weight:700;font-size:2.3rem;color:var(--pencil);direction:ltr;display:inline-block;}
  .combo-badge{display:block;text-align:center;font-family:var(--mono);font-weight:700;font-size:1.05rem;color:var(--ink);background:#F1EBDB;border-radius:10px;padding:7px 10px;margin-bottom:12px;direction:ltr;}
  .compare-note{font-size:.8rem;color:#8a7d5c;background:#F1EBDB;border-radius:8px;padding:6px 11px;margin:8px 0;display:inline-block;}
  .bonus-note{margin-top:10px;padding:9px 12px;background:#F1EBDB;border-radius:8px;font-size:.82rem;}
  .word-pair{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:10px;margin-top:8px;direction:ltr;}
  .word-card{background:#fff;border:1px solid #ecdfc2;border-radius:12px;padding:10px 8px;text-align:center;box-shadow:0 3px 10px -5px rgba(60,50,20,.08);}
  .word-card .emoji{font-size:1.7rem;line-height:1;margin-bottom:4px;}
  .word-card .word{font-family:var(--serif);font-size:1rem;font-weight:700;}
  .word-card .ipa-tag{font-family:var(--ipa);font-size:.72rem;color:var(--pencil);display:block;margin-top:1px;}
  .word-card .word-ar{font-family:var(--arabic);direction:rtl;font-size:.78rem;color:#6b5f3e;margin-top:3px;line-height:1.3;}
  .word-card .play-btn{margin-top:5px;padding:3px 9px;font-size:.68rem;}

  .listen-record-row{display:flex;gap:10px;margin:12px 0;direction:ltr;justify-content:center;}
  .speed-row{display:flex;gap:8px;margin:14px 0;direction:ltr;justify-content:center;flex-wrap:wrap;}
  .speed-btn{
    font-family:var(--sans);font-size:.82rem;font-weight:600;padding:9px 14px;border-radius:10px;
    border:1.5px solid var(--terminal);color:var(--terminal);background:#f2fbf6;cursor:pointer;
  }
  .speed-btn:hover{background:#e3f6ea;}
  .action-btn{
    flex:0 1 180px;display:flex;flex-direction:column;align-items:center;gap:4px;padding:14px 10px;
    border-radius:12px;cursor:pointer;font-family:var(--sans);font-weight:600;font-size:.82rem;
    border:1.5px solid; transition:transform .12s ease;
  }
  .action-btn:hover{transform:translateY(-1px);}
  .action-btn .icon{font-size:1.3rem;}
  .action-listen{border-color:var(--terminal);color:var(--terminal);background:#f2fbf6;}
  .action-record{border-color:var(--pencil);color:var(--pencil);background:#fdf1ef;}
  .action-record.recording{background:var(--pencil);color:#fff;animation:pulse 1s infinite;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(178,74,54,.5);}70%{box-shadow:0 0 0 14px rgba(178,74,54,0);}}
  .quiz-word{font-family:var(--serif);font-size:1.8rem;font-weight:700;text-align:center;margin:4px 0;direction:ltr;}
  .quiz-progress{font-family:var(--mono);font-size:.72rem;color:#8a7d5c;text-align:center;margin-bottom:10px;direction:ltr;}
  .quiz-options{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:10px 0;direction:ltr;}
  .quiz-opt{font-family:var(--ipa);font-size:1.05rem;font-weight:700;padding:12px 20px;border-radius:12px;border:1px solid #ecdfc2;background:#fff;cursor:pointer;transition:all .15s;}
  .quiz-opt.correct{border-color:var(--terminal);background:#e8f6ee;color:#3f8f63;}
  .quiz-opt.wrong{border-color:var(--pencil);background:#fbeae6;color:var(--pencil);}
  .quiz-opt.disabled{pointer-events:none;opacity:.55;}
  .quiz-score{text-align:center;font-family:var(--mono);font-size:.8rem;color:#8a7d5c;margin-top:8px;direction:ltr;}
  .dict-word-progress{font-family:var(--mono);font-size:.72rem;color:#8a7d5c;text-align:center;margin-bottom:6px;direction:ltr;}
  .blend-input{font-family:var(--mono);font-size:1.4rem;letter-spacing:7px;text-align:center;padding:8px 10px;border:2px solid #e6dcc2;border-radius:10px;color:var(--pencil);font-weight:700;width:100%;max-width:200px;margin:10px auto;display:block;background:#fff;direction:ltr;}
  .blend-input:focus{outline:none;border-color:var(--gold);} .blend-input:disabled{background:#e8f6ee;color:#3f8f63;border-color:var(--terminal);}
  .blend-row{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin-bottom:8px;direction:ltr;}
  .blend-letter{font-family:var(--mono);font-size:1.25rem;font-weight:700;padding:7px 13px;background:#EDE4CB;border:1px solid #e6dcc2;border-radius:9px;cursor:pointer;}
  .blend-check{font-family:var(--mono);font-size:.78rem;color:#8a7d5c;text-align:center;margin-top:6px;}
  .sentence-solo{font-family:var(--serif);font-size:1.25rem;text-align:center;padding:16px;background:#fff;border:1px solid #ecdfc2;border-radius:12px;margin-bottom:12px;direction:ltr;}
  .sentence-solo .sentence-ar{font-family:var(--arabic);direction:rtl;font-size:.9rem;color:#6b5f3e;margin-top:10px;padding-top:10px;border-top:1px dashed #e6dcc2;}
  .sent-progress{font-family:var(--mono);font-size:.72rem;color:#8a7d5c;text-align:center;margin-bottom:8px;direction:ltr;}
  .record-box{text-align:center;padding:10px;}
  audio{width:100%;margin-top:8px;}
  .note-box{margin-top:16px;padding:14px 16px;border-radius:12px;background:var(--ink);color:var(--chalk-dim);font-size:.82rem;line-height:1.6;}
  .result-card{border-radius:16px;padding:30px 24px;text-align:center;}
  .result-pass{background:#e8f6ee;border:1px solid #bfe3cd;} .result-retry{background:#FCF3DE;border:1px solid #eadfb8;}
  .badge{display:inline-block;font-family:var(--mono);font-weight:700;font-size:1.15rem;padding:9px 20px;border-radius:10px;background:var(--ink);color:var(--chalk);margin-bottom:14px;}
  @media (max-width:420px){ .word-card .emoji{font-size:1.4rem;} .word-card .word{font-size:.88rem;} .card{padding:13px 14px;} }
</style>
</head>
<body>
<div class="wrap">
  <div class="top-bar">
    <div class="letter-chip" id="letterChip">--</div>
    <div style="flex:1;"></div>
    <a href="index.html" class="btn btn-outline" style="padding:6px 12px;font-size:.78rem;text-decoration:none;">🏠 الرئيسية</a>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  <div class="step-nav-row" id="stepNavRow"></div>

  <div class="screen active" id="step1"></div>

  <div class="screen" id="step2">
    <p class="ar" style="margin-bottom:10px;" id="quizInstruction">استمع للكلمة إن أردت، ثم اختر الصوت الصحيح.</p>
    <div class="card">
      <div class="quiz-progress" id="quizProgress"></div>
      <div class="quiz-word" id="quizWord"></div>
      <div style="text-align:center;"><button class="play-btn" id="quizPlayBtn">▶ Listen</button></div>
      <div class="quiz-options" id="quizOptions"></div>
      <div class="quiz-score" id="quizScoreLine"></div>
    </div>
    <div class="nav-row"><button class="btn btn-outline" onclick="goToStep(1)">→ السابق</button><button class="btn btn-gold" onclick="goToStep(3)">التالي: تكوين الكلمات ←</button></div>
  </div>

  <div class="screen" id="step3">
    <p class="ar" style="margin-bottom:10px;">استمع للكلمة، ثم اكتب حروفها.</p>
    <div class="card"><div class="dict-word-progress" id="dictProgress"></div><div id="dictArea"></div></div>
    <div class="nav-row"><button class="btn btn-outline" onclick="goToStep(2)">→ السابق</button><button class="btn btn-gold" id="toStep4Btn" onclick="goToStep(4)">التالي: اقرأها ←</button></div>
  </div>

  <div class="screen" id="step4">
    <p class="ar" style="margin-bottom:10px;">اقرأ كل جملة بصوت عالٍ، وسجّل نفسك (تدريب اختياري).</p>
    <div class="card"><div class="sent-progress" id="sentProgress"></div><div id="sentArea"></div></div>
    <div class="nav-row"><button class="btn btn-outline" onclick="goToStep(3)">→ السابق</button><button class="btn btn-gold" id="finishBtn" onclick="showResult()">شاهد نتيجتك ←</button></div>
  </div>

  <div class="screen" id="stepResult"><div id="resultContent"></div></div>
</div>

<script src="letters-data.js"></script>
<script>
var params = new URLSearchParams(window.location.search);
var letterId = params.get('id') || 'a';
var DATA = LETTERS[letterId];
if(!DATA){ document.querySelector('.wrap').innerHTML = '<p class="ar">هذا الحرف غير موجود بعد.</p>'; throw new Error('letter not found'); }

document.getElementById('letterChip').textContent = DATA.chip;
document.getElementById('quizInstruction').textContent = 'استمع للكلمة إن أردت، ثم اختر الصوت الصحيح لحرف ' + DATA.chip.charAt(0) + ' في هذه الكلمة.';
document.getElementById('pageTitle').textContent = 'حرف ' + DATA.chip.charAt(0) + ' — المعهد الأكاديمي الحديث';

var TOTAL_STEPS = 4; var currentStep = 1;

function speak(text, rate){
  var slug = text.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');
  tryAudioFile(['audio/'+slug+'.mp3', 'audio/'+slug+'.wav'], 0, text, rate);
}
function tryAudioFile(paths, idx, text, rate){
  if(idx >= paths.length){ speakTTS(text, rate); return; }
  var audio = new Audio();
  var handled = false;
  audio.addEventListener('error', function(){
    if(handled) return;
    handled = true;
    tryAudioFile(paths, idx+1, text, rate);
  });
  audio.addEventListener('canplay', function(){
    if(handled) return;
    handled = true;
    audio.play().catch(function(){ tryAudioFile(paths, idx+1, text, rate); });
  });
  audio.src = paths[idx];
}
function speakTTS(text, rate){
  if(!('speechSynthesis' in window)) return;
  var u = new SpeechSynthesisUtterance(text); u.rate = rate || 0.9; u.lang = 'en-US';
  window.speechSynthesis.cancel(); window.speechSynthesis.speak(u);
}
function playTone(ok){
  try{
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    var osc = ctx.createOscillator(); var gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = ok ? 880 : 220; osc.type = ok ? 'sine' : 'sawtooth';
    gain.gain.setValueAtTime(0.15, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + (ok?0.3:0.4));
    osc.start(); osc.stop(ctx.currentTime + (ok?0.3:0.4));
  }catch(e){}
}
function playSoundHint(hint){ speak(hint, 0.6); }
function preloadAudio(){
  var allTexts = [];
  DATA.subScreens.forEach(function(s){ s.words.forEach(function(w){ allTexts.push(w.w); }); });
  DATA.sentences.forEach(function(s){ allTexts.push(s.en); });
  allTexts.forEach(function(text){
    var filename = 'audio/' + text.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'') + '.mp3';
    var a = new Audio();
    a.preload = 'auto';
    a.src = filename;
  });
}
var STEP_LABELS = ["تعرّف", "الأصوات", "الكتابة", "القراءة"];
function renderStepNav(){
  var row = document.getElementById('stepNavRow');
  var html = '';
  for(var i=1;i<=4;i++){
    html += '<div class="step-nav-btn'+(i===currentStep?' active':'')+'" onclick="goToStep('+i+')">'+i+'. '+STEP_LABELS[i-1]+'</div>';
  }
  row.innerHTML = html;
}
function saveProgress(){
  try{ localStorage.setItem('progress_'+letterId, JSON.stringify({step: currentStep})); }catch(e){}
}
function loadProgress(){
  try{
    var saved = localStorage.getItem('progress_'+letterId);
    if(saved){ return JSON.parse(saved).step; }
  }catch(e){}
  return 1;
}
function markLetterComplete(){
  try{
    var done = JSON.parse(localStorage.getItem('completedLetters') || '[]');
    if(done.indexOf(letterId) === -1){ done.push(letterId); }
    localStorage.setItem('completedLetters', JSON.stringify(done));
  }catch(e){}
}
function updateProgress(){ document.getElementById('progressFill').style.width = ((currentStep-1)/TOTAL_STEPS*100) + '%'; }
function goToStep(n){
  var s = document.querySelectorAll('.screen');
  for(var i=0;i<s.length;i++){ s[i].classList.remove('active'); }
  document.getElementById(n===0?'stepResult':'step'+n).classList.add('active');
  currentStep=n; updateProgress();
  if(n>=1 && n<=4){ renderStepNav(); saveProgress(); }
  if(n===2){ renderQuizWord(); } if(n===3){ renderDictWord(); } if(n===4){ renderSentence(); }
  window.scrollTo({top:0,behavior:'smooth'});
}
function autoPlayPatternSound(n){
  var s = DATA.subScreens[n-1];
  if(s && s.type === 'pattern' && s.soundHint){
    playSoundHint(s.soundHint);
    setTimeout(function(){ playSoundHint(s.soundHint); }, 1100);
  }
}
function goSub(n){
  var subs = document.querySelectorAll('.sub-screen');
  for(var i=0;i<subs.length;i++){ subs[i].classList.remove('active'); }
  document.getElementById('sub'+n).classList.add('active');
  autoPlayPatternSound(n);
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderWordCards(words){
  return words.map(function(item){
    var ipaTag = item.ipa ? '<span class="ipa-tag">'+item.ipa+'</span>' : '';
    var emoji = item.emoji ? '<div class="emoji">'+item.emoji+'</div>' : '';
    var arText = item.ar ? '<div class="word-ar">'+item.ar+'</div>' : '';
    return '<div class="word-card">'+emoji+'<div class="word">'+item.w+ipaTag+'</div>'+arText+'<button class="play-btn" onclick="speak(\''+item.w+'\')">▶</button></div>';
  }).join('');
}

function renderSubScreens(){
  var container = document.getElementById('step1');
  var html = '';
  DATA.subScreens.forEach(function(s, i){
    var n = i+1; var isFirst = i===0; var isLast = i===DATA.subScreens.length-1;
    var inner = '<div class="card">';
    if(s.type === 'pattern'){
      inner += '<div class="big-sound"><span class="ipa">'+s.ipa+'</span> <button class="play-btn" onclick="playSoundHint(\''+s.soundHint+'\')">▶</button></div>';
      if(s.combo) inner += '<div class="combo-badge">'+s.combo+'</div>';
      inner += '<p class="ar">'+s.desc+'</p>';
      if(s.compare) inner += '<div class="compare-note ar">'+s.compare+'</div>';
      inner += '<div class="word-pair">'+renderWordCards(s.words)+'</div>';
      if(s.bonus) inner += '<div class="bonus-note ar">'+s.bonus+'</div>';
    } else {
      inner += '<div class="combo-badge" style="background:#F1EBDB;">'+s.title+'</div>';
      inner += '<p class="ar">'+s.desc+'</p>';
      inner += '<div class="word-pair">'+renderWordCards(s.words)+'</div>';
    }
    inner += '</div>';
    var navLeft = isFirst ? '<span></span>' : '<button class="btn btn-outline" onclick="goSub('+(n-1)+')">→ السابق</button>';
    var navRight = isLast ? '<button class="btn btn-gold" onclick="goToStep(2)">التالي: تدريب الأصوات ←</button>' : '<button class="btn btn-gold" onclick="goSub('+(n+1)+')">التالي ←</button>';
    html += '<div class="sub-screen '+(isFirst?'active':'')+'" id="sub'+n+'">'+inner+'<div class="nav-row">'+navLeft+navRight+'</div></div>';
  });
  container.innerHTML = html;
}
renderSubScreens();
preloadAudio();
var restoredStep = loadProgress();
if(restoredStep > 1){
  currentStep = restoredStep;
  goToStep(restoredStep);
} else {
  renderStepNav();
  setTimeout(function(){ autoPlayPatternSound(1); }, 500);
}
updateProgress();

// STEP 2: quiz
var QUIZ_ITEMS = DATA.quizItems.map(function(item){
  if(item.options) return {w:item.w, correct:item.correct, options:item.options.slice()};
  var wrongs = DATA.quizSoundPool.filter(function(s){return s!==item.correct;}).sort(function(){return Math.random()-0.5;}).slice(0,2);
  return {w:item.w, correct:item.correct, options:[item.correct].concat(wrongs).sort(function(){return Math.random()-0.5;})};
});
QUIZ_ITEMS = QUIZ_ITEMS.sort(function(){return Math.random()-0.5;});
var quizIndex=0, quizScore=0;
function renderQuizWord(){
  if(quizIndex >= QUIZ_ITEMS.length){
    document.getElementById('quizProgress').textContent='Done';
    document.getElementById('quizWord').textContent='✓';
    document.getElementById('quizOptions').innerHTML='<button class="btn btn-outline" onclick="restartQuiz()">↻ إعادة التدريب</button>';
    document.getElementById('quizPlayBtn').style.display='none';
    document.getElementById('quizScoreLine').textContent='Score: '+quizScore+' / '+QUIZ_ITEMS.length;
    return;
  }
  var item = QUIZ_ITEMS[quizIndex];
  document.getElementById('quizProgress').textContent='Word '+(quizIndex+1)+' of '+QUIZ_ITEMS.length;
  document.getElementById('quizWord').textContent=item.w;
  document.getElementById('quizPlayBtn').style.display='inline-block';
  document.getElementById('quizPlayBtn').onclick=function(){speak(item.w);};
  var optsHtml='';
  for(var i=0;i<item.options.length;i++){
    var opt = item.options[i];
    var isArabic = /[\u0600-\u06FF]/.test(opt);
    var style = isArabic ? ' style="font-family:var(--arabic);direction:rtl;"' : '';
    optsHtml += '<div class="quiz-opt"'+style+' onclick="answerQuiz(this,\''+opt+'\',\''+item.correct+'\')">'+opt+'</div>';
  }
  document.getElementById('quizOptions').innerHTML=optsHtml;
  document.getElementById('quizScoreLine').textContent='Score so far: '+quizScore+' / '+quizIndex;
}
function answerQuiz(el, chosen, correct){
  if(chosen===correct){
    var opts=document.querySelectorAll('.quiz-opt');
    opts.forEach(function(o){o.classList.add('disabled'); if(o.textContent===correct) o.classList.add('correct');});
    quizScore++; playTone(true);
    setTimeout(function(){ quizIndex++; renderQuizWord(); }, 700);
  } else { el.classList.add('wrong'); el.classList.add('disabled'); playTone(false); }
}
function restartQuiz(){ quizIndex=0; quizScore=0; QUIZ_ITEMS=QUIZ_ITEMS.sort(function(){return Math.random()-0.5;}); renderQuizWord(); }

// STEP 3: dictation
var DICTATION_WORDS = DATA.dictationWords;
var dictationResults = {}; DICTATION_WORDS.forEach(function(w,i){dictationResults[i]={word:w,correct:false};});
var dictIndex=0;
function renderDictWord(){
  var area=document.getElementById('dictArea');
  if(dictIndex>=DICTATION_WORDS.length){
    document.getElementById('dictProgress').textContent='Done';
    area.innerHTML='<p style="text-align:center;">✓ '+Object.values(dictationResults).filter(function(r){return r.correct;}).length+' / '+DICTATION_WORDS.length+' correct</p>';
    document.getElementById('toStep4Btn').disabled=false;
    return;
  }
  var word=DICTATION_WORDS[dictIndex];
  document.getElementById('dictProgress').textContent='Word '+(dictIndex+1)+' of '+DICTATION_WORDS.length;
  var pool=Array.from(new Set(word.toLowerCase().split('').filter(function(c){return c!==' ';})));
  var extras=['a','e','o','u','n','t','r','s'].filter(function(l){return pool.indexOf(l)===-1;}).slice(0,2);
  var shuffledPool=pool.concat(extras).sort(function(){return Math.random()-0.5;});
  var lettersHtml=shuffledPool.map(function(l){return '<div class="blend-letter" onclick="chooseDictLetter(\''+l+'\')">'+l+'</div>';}).join('');
  area.innerHTML='<div style="text-align:center;"><button class="play-btn" onclick="speak(\''+word+'\'); document.getElementById(\'dictInput\').focus();">▶ Listen</button></div>'+
    '<input type="text" class="blend-input" id="dictInput" maxlength="'+word.length+'" placeholder="'+('_ '.repeat(word.length).trim())+'" autocomplete="off" autocapitalize="off" oninput="if(this.value.length>='+word.length+'){checkDictWord(\''+word+'\');}">'+
    '<div class="blend-row">'+lettersHtml+'</div>'+
    '<div style="text-align:center;"><button class="btn btn-outline" style="padding:7px 15px;font-size:.8rem;" onclick="checkDictWord(\''+word+'\')">تحقق</button></div>'+
    '<div class="blend-check" id="dictCheck"></div>';
  document.getElementById('toStep4Btn').disabled=true;
  document.getElementById('dictInput').focus();
}
function chooseDictLetter(letter){
  var input=document.getElementById('dictInput'); var word=DICTATION_WORDS[dictIndex];
  if(input.disabled || input.value.length>=word.length) return;
  input.value+=letter; input.focus();
}
function checkDictWord(word){
  var input=document.getElementById('dictInput'); var built=input.value.trim().toLowerCase();
  var check=document.getElementById('dictCheck');
  if(built===word.toLowerCase()){
    check.textContent='Correct'; check.style.color='#3f8f63';
    dictationResults[dictIndex].correct=true; input.disabled=true; playTone(true);
    setTimeout(function(){ dictIndex++; renderDictWord(); }, 700);
  } else {
    check.textContent='Not quite - that spelled "'+built+'". Try again.'; check.style.color='#B24A36';
    playTone(false);
    setTimeout(function(){ input.value=''; input.focus(); }, 600);
  }
}

// STEP 4: sentences
var SENTENCES = DATA.sentences;
var recordedArr = SENTENCES.map(function(){return false;});
var sentIndex=0; var mediaRecorder, chunks=[];
function renderSentence(){
  var area=document.getElementById('sentArea');
  document.getElementById('sentProgress').textContent='Sentence '+(sentIndex+1)+' of '+SENTENCES.length;
  var item=SENTENCES[sentIndex]; var isLast = sentIndex===SENTENCES.length-1;
  area.innerHTML='<div class="sentence-solo">'+item.en+'<div class="sentence-ar">'+item.ar+'</div></div>'+
    '<div class="speed-row">'+
      '<button class="speed-btn" onclick="speak(\''+item.en.replace(/'/g,"\\'")+'\', 0.6)">🐢 بطيء</button>'+
      '<button class="speed-btn" onclick="speak(\''+item.en.replace(/'/g,"\\'")+'\', 0.85)">🚶 عادي</button>'+
      '<button class="speed-btn" onclick="speak(\''+item.en.replace(/'/g,"\\'")+'\', 1.1)">🏃 أسرع</button>'+
    '</div>'+
    '<div class="listen-record-row">'+
      '<div class="action-btn action-record" id="recordBtn" onclick="toggleRecording()"><span class="icon">⏺</span><span id="recordBtnLabel">تسجيل</span></div>'+
    '</div>'+
    '<div style="text-align:center;"><div id="recordStatus" style="font-family:var(--mono);font-size:.75rem;color:#8a7d5c;">تدريب اختياري</div>'+
    '<audio id="playback" controls style="display:none;"></audio></div>'+
    '<div class="nav-row"><span></span><button class="btn btn-gold" id="sentNextBtn" onclick="'+(isLast?'finishSentences()':'nextSentence()')+'">'+(isLast?'إنهاء التدريب':'الجملة التالية ←')+'</button></div>';
}
function nextSentence(){ sentIndex++; renderSentence(); }
function finishSentences(){ document.getElementById('sentArea').innerHTML='<p style="text-align:center;">✓ انتهى التدريب على الجمل</p>'; }
function toggleRecording(){
  var btn=document.getElementById('recordBtn'); var status=document.getElementById('recordStatus'); var label=document.getElementById('recordBtnLabel');
  if(!btn.classList.contains('recording')){
    navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
      chunks=[]; mediaRecorder=new MediaRecorder(stream);
      mediaRecorder.ondataavailable=function(e){chunks.push(e.data);};
      mediaRecorder.onstop=function(){
        var blob=new Blob(chunks,{type:'audio/webm'});
        var audioEl=document.getElementById('playback');
        audioEl.src=URL.createObjectURL(blob); audioEl.style.display='block';
        recordedArr[sentIndex]=true;
      };
      mediaRecorder.start(); btn.classList.add('recording'); label.textContent='إيقاف'; status.textContent='جارٍ التسجيل... اضغط "إيقاف" عند الانتهاء';
    }).catch(function(){ status.textContent='الميكروفون غير متاح على هذا الجهاز — لا مشكلة، هذا تدريب اختياري ويمكنك المتابعة بدونه.'; });
  } else { mediaRecorder.stop(); btn.classList.remove('recording'); label.textContent='تسجيل'; status.textContent='تم التسجيل ✓'; }
}

function showResult(){
  var quizPct = QUIZ_ITEMS.length ? (quizScore/QUIZ_ITEMS.length) : 0;
  var dictCorrect = Object.values(dictationResults).filter(function(r){return r.correct;}).length;
  var dictPct = dictCorrect/DICTATION_WORDS.length;
  var overall = (quizPct*0.5)+(dictPct*0.5);
  var overallPct = Math.round(overall*100);
  var passed = overallPct >= 80;
  goToStep(0);
  var rc=document.getElementById('resultContent');
  var skipLabel, skipAction;
  if(DATA.isEndOfAlphabet){
    skipLabel = 'تخطَّ إلى خاتمة الوحدة ←';
    skipAction = "window.location.href='closure.html'";
  } else if(DATA.nextLetter){
    skipLabel = 'تخطَّ إلى حرف ' + DATA.nextLetter.toUpperCase() + ' ←';
    skipAction = "window.location.href='letter-engine.html?id="+DATA.nextLetter+"'";
  } else {
    skipLabel = 'العودة للقائمة الرئيسية';
    skipAction = "window.location.href='index.html'";
  }
  if(passed){
    markLetterComplete();
    var titleHtml = DATA.isEndOfAlphabet ? 'أكملت الأبجدية بالكامل! 🎉' : 'أحسنت!';
    var badgeHtml = DATA.isEndOfAlphabet ? '🎉 Z' : 'Letter '+DATA.chip.charAt(0);
    var actionHtml;
    if(DATA.reviewAfter){
      actionHtml = '<button class="btn btn-gold" style="margin-top:10px;" onclick="window.location.href=\''+DATA.reviewAfter+'.html\'">🎮 العب مراجعة ممتعة الآن ←</button>'+
        '<div style="margin-top:10px;"><button class="btn btn-outline" onclick="'+skipAction+'" style="font-size:.82rem;padding:9px 16px;">'+skipLabel+' (تخطَّ المراجعة)</button></div>';
    } else {
      actionHtml = '<button class="btn btn-gold" style="margin-top:10px;" onclick="'+skipAction+'">'+skipLabel+'</button>';
    }
    rc.innerHTML='<div class="result-card result-pass"><div class="badge">'+badgeHtml+'</div>'+
      '<h2 style="margin-top:0;font-family:var(--serif);">'+titleHtml+'</h2><p>Score: '+overallPct+'%</p>'+
      actionHtml+
      '<div class="note-box ar">القراءة والتسجيل تدريب حر — لا يدخل في التقييم.</div></div>';
  } else {
    rc.innerHTML='<div class="result-card result-retry"><div class="badge">'+overallPct+'%</div>'+
      '<p class="ar">تحتاج إلى 80%+ في تمرين الأصوات وتكوين الكلمات لإنهاء هذا الحرف.</p>'+
      '<button class="btn btn-gold" style="margin-top:8px;" onclick="location.reload()">إعادة المحاولة</button>'+
      '<div style="margin-top:12px;"><button class="btn btn-outline" onclick="'+skipAction+'" style="font-size:.8rem;">تخطَّ للحرف التالي (للاختبار فقط) ←</button></div></div>';
  }
}
</script>
</body>
