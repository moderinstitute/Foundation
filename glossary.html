<!DOCTYPE html>

<head>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans:wght@400;600;700&family=Noto+Sans+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1C2B39; --ink-2:#111C26;
    --chalk:#F5F1E6; --chalk-dim:#E4DBC6;
    --gold:#C99A3E; --gold-soft:#E7C67B;
    --terminal:#5FBF8A; --pencil:#B24A36;
    --serif:'IBM Plex Serif',serif; --sans:'IBM Plex Sans',sans-serif; --mono:'IBM Plex Mono',monospace;
    --arabic:'Noto Sans Arabic',sans-serif; --ipa:'IBM Plex Mono','Noto Sans',monospace;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:var(--sans);background:linear-gradient(180deg,#F7F3E9 0%,#F5F1E6 100%);color:var(--ink);}
  .wrap{max-width:780px;margin:0 auto;padding:24px 20px 70px;}
  p{color:#4a5a68;line-height:1.6;}
  .ar{direction:rtl;text-align:right;font-family:var(--arabic);}
  .top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .badge{font-family:var(--mono);font-weight:700;font-size:.8rem;color:var(--chalk);background:var(--ink);border-radius:8px;padding:6px 12px;}
  .btn-outline{border-color:#d5c9a3;color:var(--ink);background:transparent;padding:6px 12px;font-size:.78rem;border-radius:10px;border:1.5px solid #d5c9a3;text-decoration:none;font-family:var(--sans);}
  h1{font-family:var(--serif);font-size:1.5rem;margin:0 0 6px;}
  .search-box{
    width:100%;padding:12px 16px;border-radius:12px;border:1.5px solid #e6dcc2;font-family:var(--sans);
    font-size:.95rem;margin:14px 0 20px;direction:rtl;background:#fff;
  }
  .letter-group{margin-bottom:22px;}
  .letter-title{
    font-family:var(--mono);font-weight:700;font-size:1.2rem;color:var(--pencil);
    border-bottom:2px solid var(--gold-soft);padding-bottom:6px;margin-bottom:10px;direction:ltr;
  }
  .word-row{
    background:#fff;border:1px solid #ecdfc2;border-radius:12px;
    padding:10px 14px;margin-bottom:8px;box-shadow:0 3px 10px -5px rgba(60,50,20,.06);
  }
  .word-row-top{display:flex;align-items:center;gap:10px;direction:ltr;}
  .word-row .en{font-family:var(--serif);font-weight:700;font-size:1rem;}
  .word-row .ipa-tag{font-family:var(--ipa);font-size:.8rem;color:var(--pencil);}
  .word-row .play-btn{
    font-family:var(--mono);font-size:.68rem;border:1px solid var(--terminal);color:var(--terminal);
    background:#f2fbf6;border-radius:20px;padding:4px 10px;cursor:pointer;flex-shrink:0;margin-inline-start:auto;
  }
  .word-row-bottom{display:flex;align-items:center;gap:8px;margin-top:6px;direction:rtl;flex-wrap:wrap;}
  .word-row .ar-mean{font-family:var(--arabic);direction:rtl;color:#4a4132;font-size:.9rem;flex:1;min-width:0;}
  .word-row .lesson-tag{
    font-family:var(--mono);font-size:.64rem;color:#8a7d5c;background:#F1EBDB;border-radius:10px;
    padding:2px 7px;flex-shrink:0;direction:ltr;
  }
  .word-row.hidden{display:none;}
  .note-box{margin-top:20px;padding:14px 16px;border-radius:12px;background:var(--ink);color:var(--chalk-dim);font-size:.82rem;line-height:1.6;}
</style>
</head>

  <input type="text" class="search-box" id="searchBox" placeholder="ابحث عن كلمة..." oninput="filterWords()">
  <div id="glossaryContainer"></div>
  <div class="note-box ar">هذا القاموس يكبر تلقائياً مع كل حرف جديد نضيفه.</div>

function speak(text){
  var filename = 'audio/' + text.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'') + '.mp3';
  var audio = new Audio();
  var handled = false;
  audio.addEventListener('error', function(){ if(handled) return; handled = true; speakTTS(text); });
  audio.addEventListener('canplay', function(){ if(handled) return; handled = true; audio.play().catch(function(){ speakTTS(text); }); });
  audio.src = filename;
}
function speakTTS(text){
  if(!('speechSynthesis' in window)) return;
  var u = new SpeechSynthesisUtterance(text); u.rate = 0.9; u.lang = 'en-US';
  window.speechSynthesis.cancel(); window.speechSynthesis.speak(u);
}

// Group dynamically by the word's REAL first letter (dictionary order),
// not by which lesson introduced it — e.g. "many" appears under M, even though it was taught in Lesson A.
var GLOSSARY = {};
GLOSSARY_FLAT.forEach(function(item){
  var firstLetter = item.w.charAt(0).toUpperCase();
  if(!GLOSSARY[firstLetter]) GLOSSARY[firstLetter] = [];
  GLOSSARY[firstLetter].push(item);
});
var sortedLetters = Object.keys(GLOSSARY).sort();
sortedLetters.forEach(function(letter){
  GLOSSARY[letter].sort(function(a,b){ return a.w.localeCompare(b.w); });
});

var container = document.getElementById('glossaryContainer');
sortedLetters.forEach(function(letter){
  var group = document.createElement('div');
  group.className = 'letter-group';
  var html = '<div class="letter-title">'+letter+'</div>';
  GLOSSARY[letter].forEach(function(item){
    html += '<div class="word-row" data-word="'+item.w.toLowerCase()+'">'+
      '<div class="word-row-top"><span class="en">'+item.w+'</span><span class="ipa-tag">'+item.ipa+'</span>'+
      '<button class="play-btn" onclick="speak(\''+item.w+'\')">▶</button></div>'+
      '<div class="word-row-bottom"><span class="ar-mean">'+item.ar+'</span><span class="lesson-tag">درس '+item.lesson+'</span></div>'+
      '</div>';
  });
  group.innerHTML = html;
  container.appendChild(group);
});

function filterWords(){
  var q = document.getElementById('searchBox').value.trim().toLowerCase();
  document.querySelectorAll('.word-row').forEach(function(row){
    var match = row.dataset.word.indexOf(q) !== -1;
    row.classList.toggle('hidden', q.length > 0 && !match);
  });
  document.querySelectorAll('.letter-group').forEach(function(group){
    var visible = group.querySelectorAll('.word-row:not(.hidden)').length;
    group.style.display = visible === 0 ? 'none' : 'block';
  });
}
</script>
