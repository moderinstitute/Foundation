<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مقدمة الوحدة — المعهد الأكاديمي الحديث</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=Noto+Sans+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{--ink:#1C2B39;--ink-2:#111C26;--chalk:#F5F1E6;--gold:#C99A3E;--gold-soft:#E7C67B;--serif:'IBM Plex Serif',serif;--sans:'IBM Plex Sans',sans-serif;--arabic:'Noto Sans Arabic',sans-serif;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:var(--arabic);background:var(--ink);color:var(--chalk);direction:rtl;min-height:100vh;display:flex;flex-direction:column;}
  .top-bar{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;}
  .badge{font-family:var(--sans);font-size:.75rem;color:var(--gold-soft);border:1px solid var(--gold-soft);border-radius:20px;padding:5px 14px;direction:ltr;}
  .skip-link{color:var(--chalk);opacity:.7;text-decoration:none;font-size:.85rem;}
  .video-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:0 16px;}
  .video-frame{width:100%;max-width:900px;position:relative;border-radius:16px;overflow:hidden;box-shadow:0 20px 60px -20px rgba(0,0,0,.6);background:#000;}
  video{width:100%;display:block;max-height:70vh;}
  .play-overlay{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    background:rgba(0,0,0,.4);cursor:pointer;
  }
  .play-overlay .play-icon{
    width:80px;height:80px;border-radius:50%;background:var(--gold);color:var(--ink-2);
    display:flex;align-items:center;justify-content:center;font-size:2rem;
  }
  .bottom-bar{text-align:center;padding:20px;}
  .btn{display:inline-block;padding:13px 28px;border-radius:10px;font-weight:700;font-size:.95rem;cursor:pointer;border:1px solid transparent;font-family:var(--sans);text-decoration:none;}
  .btn-gold{background:linear-gradient(135deg,var(--gold),#d9ac54);color:var(--ink-2);}
  .caption{color:var(--chalk);opacity:.75;font-size:.85rem;margin-top:10px;}
</style>
</head>
<body>
  <div class="top-bar">
    <div class="badge">FOUNDATION · مقدمة</div>
    <a href="how-to-use.html" class="skip-link">تخطَّ الفيديو ←</a>
  </div>

  <div class="video-wrap">
    <div class="video-frame">
      <video id="introVideo" playsinline controls>
        <source src="video/foundation-intro.mp4" type="video/mp4">
        عذراً، متصفحك لا يدعم تشغيل الفيديو مباشرة.
      </video>
      <div class="play-overlay" id="playOverlay" onclick="startVideo()">
        <div class="play-icon">▶</div>
      </div>
    </div>
  </div>

  <div class="bottom-bar">
    <p class="caption">كيف نتعلّم لغة؟ الحروف الإنجليزية، الحركات والساكنات، والفرق بين الحرف والصوت.</p>
    <a href="how-to-use.html" class="btn btn-gold" id="continueBtn">المتابعة ←</a>
  </div>

<script>
var video = document.getElementById('introVideo');
var overlay = document.getElementById('playOverlay');

function startVideo(){
  video.muted = false;
  video.play();
  overlay.style.display = 'none';
}

// Try autoplay with sound as soon as the page opens; if the browser blocks it,
// show a clear play button instead (overlay stays visible until the user taps it).
window.addEventListener('load', function(){
  var p = video.play();
  if(p !== undefined){
    p.then(function(){
      overlay.style.display = 'none';
    }).catch(function(){
      overlay.style.display = 'flex';
    });
  }
});

// When the video finishes, move straight to the next page automatically.
video.addEventListener('ended', function(){
  window.location.href = 'how-to-use.html';
});
</script>
</body>
</html>
